spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

adapter:
  micro-users:
    timeout: 5000
    url: ${USERS_SERVICE_URL}
  micro-messaging:
    url: ${MESSAGING_SERVICE_URL}
  micro-traceability:
    url: ${TRACEABILITY_SERVICE_URL}

jwt:
  secret: ${JWT_SECRET}